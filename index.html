<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            
            color: white;
            font-family: inter;
        }
        .container {
            position: relative;
            height: 100vh;
            aspect-ratio: 9/20;

            display: flex;
            align-items: center;
            justify-content: center;

            .background {
                position: absolute;
                top: 0;
                z-index: 0;
                img {
                    height: 100vh;
                }
            }
            .video {
                width: 100%;
                aspect-ratio: 9/17;
                background-color: #000;

                position: absolute;
                top: 87px;
                left: 0;
                z-index: 1;
                .sesuatu {
                    /* height: 50%; */
                    width: 100%;
                    position: absolute;
                    bottom: 0;
                    padding: 18px;
                    display: flex;
                    justify-content: space-between;


                    .profile {
                        display: flex;
                        flex-direction: column;
                        gap: 8px;

                        position: absolute;
                        bottom: 18px;

                        .pp {
                            display: flex;
                            align-items: center;
                            gap: 10px;
                            .foto {
                                height: 34px;
                                aspect-ratio: 1;
                                background-color: #fff;
                                border-radius: 50%;
                            }
                            .subs {
                                color: black;
                                background-color: #fff;
                                font-weight:600;
                                padding: 8px 14px;
                                font-size: .94rem;
                                border-radius: 100px;
                            }

                        }
                        .caption {
                            font-size: .9rem;
                        }
                    }
                    .tombolan {
                        height: 100%;
                        
                        display: flex;
                        flex-direction: column;

                        gap: 21.1px;
                        padding: 0 2px;
                        position: absolute;
                        right: 0;
                        bottom: 346px;
                        svg {
                            fill: white;
                        }
                        yt-icon {
                            aspect-ratio: 1;
                        }
                        .like {
                            width: 100%;
                        }
                        .icon {
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            gap: 5px;
                            font-weight: bold;
                            font-size: .9rem;
                        }
                        .sound {
                            width: 100%;
                            display: flex;
                            align-items: center;
                            justify-content: center;

                            .fotoan {
                                background-color: #fff;
                                border-radius: 8px;
                                height: 35px;
                                aspect-ratio: 1;
                            }
                        }
                    }
                }
            }
        }
        .inputan {
            width: 100%;
            max-width: 1440px;
            color: black;

            display: flex;
            flex-direction: column;

            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;

            h1 {
                font-size: 1.5rem;
                text-align: center;
                margin-bottom: 1.5rem;
            }

            label {
                display: block;
                margin: 1rem 0 0.5rem;
                font-weight: 600;
            }

            /* Mengelompokkan input dan textarea */
            input, textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                box-sizing: border-box;

                &:focus {
                outline: 2px solid #007bff;
                border-color: transparent;
                }
            }

            textarea {
                height: 100px;
                resize: vertical;
            }
            
        }
    </style>

    <style>
        @media screen and (max-width: 480px) {
            .container {
                width: 100%;
                .background {
                    width: 100%;
                    height: auto;
                    img {
                        width: 100%;
                        height: auto;
                    }
                }
            }
        }
    </style>
</head>
<body>
    <div class="inputan">
        <h1>inputan</h1>
        <label for="video">masukkan video</label>
        <input type="file" name="video" id="video" accept="video/*">
        <label for="pp">masukkan pp(mungkin)</label>
        <input type="file" name="pp" id="pp">
        <label for="nama">masukkan nama(mungkin)</label>
        <input type="text" placeholder="@noelao">
        <label for="caption">masukkan caption(mungkin)</label>
        <textarea name="caption" id="caption"></textarea>
        <label for="geser">geserKeatas ?</label>
        <input type="number" name="geser" id="geser" placeholder="12">
    </div>
    <div class="container">
        <div class="video">
            <style>
                #videoWrapper {
                    width: 100%;
                }
                .duration-overlay {
                    position: absolute;
                    bottom: 15px;
                    right: 15px;
                    background: rgba(0, 0, 0, 0.6);
                    color: white;
                    padding: 5px 10px;
                    border-radius: 5px;
                    font-size: 12px;
                    pointer-events: none; /* Agar klik tetap tembus ke video */
                }

            </style>
            <div id="videoWrapper">
                <video id="myVideo" width="100%" loop>
                    <source src="" type="video/mp4">
                </video>            
            </div>

            <style>
                .durationLine {
                    width: 100%;
                    height: 3px;
                    background-color: #8d8d8d;

                    display: flex;
                    align-items: center;
                    justify-content: center;

                    position: absolute;
                    bottom: -4px;
                    .garisDurasi {
                        position: absolute;
                        left: 0;
                        width: 0;
                        height: 3px;
                        background-color: red;
                    }
                    span {
                        position: absolute;
                        left: 0;
                        background-color: red;
                        width: 12px;
                        aspect-ratio: 1;
                        border-radius: 50%;
                        transform: translateX(-50%);
                    }
                }
            </style>
            <div class="durationLine">
                <div class="garisDurasi"></div>
                <span class="bulatMerah"></span>
            </div>


            <div class="sesuatu">
                <div class="profile">
                    <div class="pp">
                        <style>
                            .foto {
                                img {
                                    width: 100%;
                                    height: 100%;
                                    object-fit: cover;
                                    border-radius: 50%;
                                }
                            }
                        </style>
                        <div class="foto">
                            <img src="profile.jpg" alt="">
                        </div>
                        <small>@elplongor</small>
                        <div class="subs">
                            <small>Subscribe</small>
                        </div>
                    </div>
                    <div class="caption">
                        <p>20 Mei 2025</p>
                    </div>
                </div>
                <div class="tombolan">
                    <div class="icon like">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" fill="#fff" aria-hidden="true" ><path d="M9.221 1.795a1 1 0 011.109-.656l1.04.173a4 4 0 013.252 4.784L14 9h4.061a3.664 3.664 0 013.576 2.868A3.68 3.68 0 0121 14.85l.02.087A3.815 3.815 0 0120 18.5v.043l-.01.227a2.82 2.82 0 01-.135.663l-.106.282A3.754 3.754 0 0116.295 22h-3.606l-.392-.007a12.002 12.002 0 01-5.223-1.388l-.343-.189-.27-.154a2.005 2.005 0 00-.863-.26l-.13-.004H3.5a1.5 1.5 0 01-1.5-1.5V12.5A1.5 1.5 0 013.5 11h1.79l.157-.013a1 1 0 00.724-.512l.063-.145 2.987-8.535Zm-1.1 9.196A3 3 0 015.29 13H4v4.998h1.468a4 4 0 011.986.528l.27.155.285.157A10 10 0 0012.69 20h3.606c.754 0 1.424-.483 1.663-1.2l.03-.126a.819.819 0 00.012-.131v-.872l.587-.586c.388-.388.577-.927.523-1.465l-.038-.23-.02-.087-.21-.9.55-.744A1.663 1.663 0 0018.061 11H14a2.002 2.002 0 01-1.956-2.418l.623-2.904a2 2 0 00-1.626-2.392l-.21-.035-2.71 7.741Z"></path></svg>
                        <small>30 rb</small>
                    </div>
                    <div class="icon dislike">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true"><path d="m11.31 2 .392.007c1.824.06 3.61.534 5.223 1.388l.343.189.27.154c.264.152.56.24.863.26l.13.004H20.5a1.5 1.5 0 011.5 1.5V11.5a1.5 1.5 0 01-1.5 1.5h-1.79l-.158.013a1 1 0 00-.723.512l-.064.145-2.987 8.535a1 1 0 01-1.109.656l-1.04-.174a4 4 0 01-3.251-4.783L10 15H5.938a3.664 3.664 0 01-3.576-2.868A3.682 3.682 0 013 9.15l-.02-.088A3.816 3.816 0 014 5.5v-.043l.008-.227a2.86 2.86 0 01.136-.664l.107-.28A3.754 3.754 0 017.705 2h3.605ZM7.705 4c-.755 0-1.425.483-1.663 1.2l-.032.126a.818.818 0 00-.01.131v.872l-.587.586a1.816 1.816 0 00-.524 1.465l.038.23.02.087.21.9-.55.744a1.686 1.686 0 00-.321 1.18l.029.177c.17.76.844 1.302 1.623 1.302H10a2.002 2.002 0 011.956 2.419l-.623 2.904-.034.208a2.002 2.002 0 001.454 2.139l.206.045.21.035 2.708-7.741A3.001 3.001 0 0118.71 11H20V6.002h-1.47c-.696 0-1.38-.183-1.985-.528l-.27-.155-.285-.157A10.002 10.002 0 0011.31 4H7.705Z"></path></svg>
                        <small>Tidak suka</small>
                    </div>
                    <div class="icon komentar">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true"><path d="M1 6a4 4 0 014-4h14a4 4 0 014 4v10a4 4 0 01-4 4h-4.8l-5.105 2.836A1.41 1.41 0 017 21.604V20H5a4 4 0 01-4-4V6Zm8 12v2.601l4.229-2.35.453-.251H19a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h4ZM7 8a1 1 0 000 2h10a1 1 0 100-2H7Zm-1 5a1 1 0 001 1h6a1 1 0 000-2H7a1 1 0 00-1 1Z"></path></svg>
                        <small>260</small>
                    </div>
                    <div class="icon share">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true"><path d="M10 3.158V7.51c-5.428.223-8.27 3.75-8.875 11.199-.04.487-.07.975-.09 1.464l-.014.395c-.014.473.578.684.88.32.302-.368.61-.73.925-1.086l.244-.273c1.79-1.967 3-2.677 4.93-2.917a18.011 18.011 0 012-.112v4.346a1 1 0 001.646.763l9.805-8.297 1.55-1.31-1.55-1.31-9.805-8.297A1 1 0 0010 3.158Zm2 6.27v.002-4.116l7.904 6.688L12 18.689v-4.212l-2.023.024c-1.935.022-3.587.17-5.197 1.024a9 9 0 00-1.348.893c.355-1.947.916-3.39 1.63-4.425 1.062-1.541 2.607-2.385 5.02-2.485L12 9.428Z"></path></svg>
                        <small>Bagikan</small>
                    </div>
                    <div class="icon remix">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true"><path d="M10.564 1.095a11 11 0 00-9.189 8.058 1 1 0 101.932.517A8.999 8.999 0 0119.481 7H18a1 1 0 100 2h5V4a1 1 0 00-2 0v1.679a11 11 0 00-10.436-4.584ZM12 7a1 1 0 00-1 1v3H8a1 1 0 000 2h3v3a1 1 0 002 0v-3h3a1 1 0 000-2h-3V8a1 1 0 00-1-1Zm8.693 7.33A9 9 0 014.517 17H6a1 1 0 000-2H1v5a1 1 0 102 0v-1.68a11 11 0 0019.625-3.472 1 1 0 10-1.932-.518Z"></path></svg>
                        <small>Remix</small>
                    </div>
                    <div class="sound">
                        <style>
                            .fotoan {
                                overflow: hidden;
                                border: solid white 1.3px;
                                img {
                                    width: 100%;
                                    height: 100%;
                                    object-fit: cover;
                                }
                            }
                        </style>
                        <div class="fotoan">
                            <img src="profile.jpg" alt="">
                        </div>
                    </div>
    
                </div>
            </div>
        </div>

        <div class="background">
            <img src="Screenshot_2026-05-02-16-40-12-465_com.google.android.youtube.jpg" alt="">
        </div>
    </div>


    <script>
        const video = document.getElementById('myVideo');
        const wrapper = document.getElementById('videoWrapper');
        const timeDisplay = document.getElementById('timeDisplay');

        // 1. Toggle Play/Pause saat diklik
        wrapper.addEventListener('click', () => {
        if (video.paused) {
            video.play();
        } else {
            video.pause();
        }
        });


        video.addEventListener('timeupdate', () => {
            const durationLine = document.querySelector('.durationLine');
            const garisDurasi = durationLine.querySelector('.garisDurasi');
            const bulatMerah = durationLine.querySelector('.bulatMerah');

            garisDurasi.style.width = `${(video.currentTime / video.duration) * 100}%`;
            bulatMerah.style.left = `${(video.currentTime / video.duration) * 100}%`;
        });

    </script>

    <!-- input -->
    <script>
        const inputVideo = document.getElementById('video');
        const inputPp = document.getElementById('pp');
        const inputNama = document.getElementById('nama');
        const inputCaption = document.getElementById('caption');
        const geserKeatas = document.getElementById('geser');

        inputVideo.addEventListener('change', function(event) {

            // 1. Ambil file yang dipilih pengguna
            const file = event.target.files[0];
            
            // 2. Pastikan file ada
            if (file) {
                // 3. Buat URL sementara untuk file tersebut
                const videoUrl = URL.createObjectURL(file);
                
                // 4. Masukkan URL ke sumber video
                video.src = videoUrl;
                
                // 5. Muat dan putar video
                video.load();
            }
        });

        geserKeatas.addEventListener("keyup", function(){
            document.querySelector(".video").style.top = (parseInt(geserKeatas.value) * -1 + 87) + "px";
        });
    </script>
</body>
</html>
